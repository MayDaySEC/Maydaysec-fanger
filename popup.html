<!DOCTYPE html>
<html>
<head>
  <title>Maydaysec.io URL De/fanger</title>
  <link rel="stylesheet" href="popup.css">
  <script src="popup.js" defer></script>
</head>
<body>
  <div class="header">
    <h2>Maydaysec.io</h2>
    <a href="https://maydaysec.io" target="_blank" class="site-link">Visit Website</a>
  </div>

  <div class="mode-toggle">
    <button id="singleMode" class="active">Single</button>
    <button id="batchMode">Batch</button>
  </div>

  <div id="singleUrlSection" class="url-section">
    <div class="input-group">
      <label for="urlInput">Enter URL or IP:</label>
      <input type="text" id="urlInput" placeholder="https://example.com or 192.168.1.1">
    </div>

    <div class="button-group">
      <button id="defangButton">Defang</button>
      <button id="fangButton">Fang</button>
    </div>

    <div class="input-group">
      <label for="outputUrl">Result:</label>
      <input type="text" id="outputUrl" readonly>
    </div>
  </div>

  <div id="batchUrlSection" class="url-section" style="display: none;">
    <div class="input-group">
      <label for="batchInput">Enter URLs / IPs (one per line):</label>
      <textarea id="batchInput" rows="5" placeholder="https://example1.com&#10;192.168.1.1&#10;2001:db8::1"></textarea>
    </div>

    <div class="button-group">
      <button id="batchDefangButton">Defang All</button>
      <button id="batchFangButton">Fang All</button>
    </div>

    <div class="input-group">
      <label for="batchOutput">Results:</label>
      <textarea id="batchOutput" rows="5" readonly></textarea>
    </div>
  </div>

  <div class="action-buttons">
    <button id="copyButton">Copy to Clipboard</button>
    <button id="clearButton">Clear All</button>
  </div>

  <div id="statusMessage" class="status-message"></div>

  <div class="shortcuts-info">
    <small>Tip: Press Ctrl/Cmd + Enter to defang &bull; Supports URLs, IPv4 &amp; IPv6</small>
  </div>
</body>
</html>
